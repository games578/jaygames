<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apps - Lumousa</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: #0f0f0f;
      color: #fff;
      font-family: Arial, sans-serif;
      height: 100vh;
      overflow: hidden;
    }
    .header {
      background: #1a1a1a;
      padding: 15px 20px;
      text-align: center;
      font-size: 20px;
      border-bottom: 2px solid #333;
    }
    .container {
      padding: 30px 20px;
      text-align: center;
    }
    .app-card {
      display: inline-block;
      background: #1f1f1f;
      border-radius: 12px;
      padding: 25px 20px;
      margin: 15px;
      width: 300px;
      transition: all 0.3s;
      cursor: pointer;
    }
    .app-card:hover {
      transform: scale(1.06);
      background: #2a2a2a;
    }
    .app-card h2 {
      margin: 15px 0 8px;
      font-size: 24px;
    }
    .app-card p {
      color: #aaa;
      font-size: 15px;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      position: fixed;
      top: 0;
      left: 0;
      z-index: 999;
      display: none;
    }
    .back-btn {
      position: fixed;
      top: 15px;
      left: 15px;
      background: #333;
      color: white;
      padding: 10px 18px;
      border-radius: 8px;
      cursor: pointer;
      z-index: 1001;
      font-size: 16px;
      display: none;
    }
    .notice {
      color: #ffcc00;
      margin-top: 10px;
      font-size: 14px;
    }
  </style>
</head>
<body>

  <div class="header">
    Lumousa Apps - Unblocked Proxy
  </div>

  <div class="container" id="appsPage">
    <h1 style="margin-bottom: 10px;">Popular Apps niahah</h1>
    <p style="color:#888; margin-bottom: 30px;">Click any app below</p>

    <div class="app-card" onclick="openGeForceNow()">
      <h2>🎮 GeForce Now</h2>
      <p>Cloud Gaming - Play PC games in browser</p>
      <div class="notice">→ After clicking, type the NVIDIA link in the top bar if needed</div>
    </div>

    <!-- Add more cards here later if you want -->
  </div>

  <div class="back-btn" id="backBtn" onclick="goBack()">← Back to Apps</div>

  <iframe id="proxyFrame" allowfullscreen allow="fullscreen; clipboard-write; encrypted-media"></iframe>

  <script>
    function openGeForceNow() {
      document.getElementById('appsPage').style.display = 'none';
      document.getElementById('backBtn').style.display = 'block';
      
      const frame = document.getElementById('proxyFrame');
      frame.src = "https://scramjet.mercurywork.shop/";
      frame.style.display = 'block';
    }

    function goBack() {
      const frame = document.getElementById('proxyFrame');
      frame.style.display = 'none';
      frame.src = '';
      document.getElementById('backBtn').style.display = 'none';
      document.getElementById('appsPage').style.display = 'block';
    }
  </script>

</body>
</html>
